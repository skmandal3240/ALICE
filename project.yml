name: ALICE
options:
  bundleIdPrefix: com.alice
  deploymentTarget:
    macOS: "14.2"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES

targets:
  ALICE:
    type: application
    platform: macOS
    sources:
      - path: ALICE
    resources:
      - path: ALICE/Resources
        optional: true
    info:
      path: ALICE/Info.plist
      properties:
        CFBundleName: ALICE
        CFBundleDisplayName: ALICE
        CFBundleIdentifier: com.alice.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        LSMinimumSystemVersion: "14.2"
        LSUIElement: true
        NSMicrophoneUsageDescription: "ALICE needs microphone access to hear your voice commands."
        NSScreenCaptureDescription: "ALICE needs screen recording access to see your screen and help you."
        ALICE_GATEWAY_URL: "http://localhost:8787"
        VOICE_TRANSCRIPTION_PROVIDER: "apple"
        ALICE_ANALYTICS_KEY: ""
        ALICE_ANALYTICS_HOST: ""
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alice.app
        PRODUCT_NAME: ALICE
        INFOPLIST_FILE: ALICE/Info.plist
        CODE_SIGN_ENTITLEMENTS: ALICE/ALICE.entitlements
    dependencies:
      - package: PostHog
      - package: Sparkle

  ALICETests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ALICETests
    dependencies:
      - target: ALICE
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alice.tests
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/ALICE.app/Contents/MacOS/ALICE"

packages:
  PostHog:
    url: https://github.com/PostHog/posthog-ios
    from: "3.0.0"
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.7.0"
